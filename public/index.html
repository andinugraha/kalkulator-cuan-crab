<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalkulator Ilmiah</title>
    <!-- Memuat font Roboto untuk branding yang bersih, polos, dan profesional -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script src="/config.js"></script>
  </head>
  <body>
    <main class="shell" aria-label="Kalkulator">
      <div class="calculator-wrapper">
        
        <!-- KALKULATOR -->
        <section class="calculator" aria-label="Mesin Kalkulator">
          
          <!-- DISPLAY -->
          <div class="display" aria-live="polite">
            <!-- Tombol Ikon Riwayat di Kiri Atas -->
            <button id="history-toggle-btn" class="history-toggle-btn" title="Tampilkan Riwayat">
              <svg viewBox="0 0 24 24" width="20" height="20">
                <path fill="currentColor" d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6a7 7 0 1 1 .6 2.74l-1.47 1.48A9 9 0 1 0 13 3zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/>
              </svg>
            </button>

            <!-- Teks Rumus & Status Hasil -->
            <div class="display-text-container">
              <div id="expression" class="expression">0</div>
              <div id="status" class="status"></div>
            </div>

            <!-- Panel Riwayat Melayang (Floating Popover) -->
            <div id="history-popover" class="history-popover hidden">
              <div class="history-popover-header">
                <span>Riwayat Perhitungan</span>
                <button id="clear-history" class="clear-history-btn">Hapus</button>
              </div>
              <ul id="history-list" class="history-list">
                <!-- Item diisi dinamis via JS -->
              </ul>
            </div>
          </div>

          <!-- GRID TOMBOL (Dikelompokkan untuk Responsivitas) -->
          <div class="keys">
            <!-- Tombol Ilmiah (3 Kolom di Desktop, 5 Kolom di Mobile) -->
            <div class="keys-scientific">
              <button class="key scientific deg-btn active" data-action="set-deg">Deg</button>
              <button class="key scientific rad-btn" data-action="set-rad">Rad</button>
              <button class="key scientific" data-value="!">x!</button>
              <button class="key scientific" data-action="toggle-inv">Inv</button>
              <button class="key scientific" data-value="sin(">sin</button>
              <button class="key scientific" data-value="ln(">ln</button>
              <button class="key scientific" data-value="π">π</button>
              <button class="key scientific" data-value="cos(">cos</button>
              <button class="key scientific" data-value="log(">log</button>
              <button class="key scientific" data-value="e">e</button>
              <button class="key scientific" data-value="tan(">tan</button>
              <button class="key scientific" data-value="√(">√</button>
              <button class="key scientific" data-action="ans">Ans</button>
              <button class="key scientific" data-action="exp">EXP</button>
              <button class="key scientific" data-value="^">xʸ</button>
            </div>

            <!-- Tombol Standar (4 Kolom) -->
            <div class="keys-standard">
              <button class="key scientific" data-value="(">(</button>
              <button class="key scientific" data-value=")">)</button>
              <button class="key scientific" data-value="%">%</button>
              <button class="key utility" data-action="clear">AC</button>
              
              <button class="key number" data-value="7">7</button>
              <button class="key number" data-value="8">8</button>
              <button class="key number" data-value="9">9</button>
              <button class="key operator" data-value="÷">÷</button>
              
              <button class="key number" data-value="4">4</button>
              <button class="key number" data-value="5">5</button>
              <button class="key number" data-value="6">6</button>
              <button class="key operator" data-value="×">×</button>
              
              <button class="key number" data-value="1">1</button>
              <button class="key number" data-value="2">2</button>
              <button class="key number" data-value="3">3</button>
              <button class="key operator" data-value="−">−</button>
              
              <button class="key number" data-value="0">0</button>
              <button class="key number" data-value=".">.</button>
              <button class="key equals" data-action="pay">=</button>
              <button class="key operator" data-value="+">+</button>
            </div>
          </div>
        </section>

      </div>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
